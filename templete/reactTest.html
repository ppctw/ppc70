<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Hello!</title>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- import the webpage's stylesheet -->
    <link rel="stylesheet" href="/style.css" />

    <script src="https://unpkg.com/@babel/standalone@7.4.4/babel.js"></script>
    <script
      src="https://unpkg.com/react@16/umd/react.development.js"
      crossorigin
    ></script>
    <script
      src="https://unpkg.com/react-dom@16/umd/react-dom.development.js"
      crossorigin
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.js"></script>

    <script>
      Babel.registerPreset("my-preset", {
        presets: [
          [Babel.availablePresets["es2015"], { modules: false }],
          [Babel.availablePresets["react"]],
        ],
        plugins: [[Babel.availablePlugins["transform-modules-umd"]]],
        moduleId: "main",
      });
    </script>
    <script
      type="text/babel"
      src="./app.js"
      data-plugins="transform-modules-umd"
    ></script>
    <script type="text/babel" data-presets="my-preset">
      import App from "./app";
      ReactDOM.render(<App />, document.getElementById("root"));
    </script>
  </head>
  <body>
    <p>Output should appear below.</p>
    <hr />
    <div id="root"></div>
  </body>
</html>
